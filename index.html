<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ORION — Autonomous Financial Intelligence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>

:root{
  --bg:#070809;
  --panel:#0c0e11;
  --panel-2:#101317;
  --line:#1a1e25;

  --ink:#e7ecf3;
  --muted:#8a93a3;
  --dim:#5b6373;

  --accent:#7dd3fc;
  --accent-2:#c4b5fd;

  --green:#34d399;
  --red:#fb7185;
  --amber:#fbbf24;
}

html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Geist',ui-sans-serif,system-ui,sans-serif;
}

.font-mono{
  font-family:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}

.font-serif{
  font-family:'Instrument Serif',serif;
  font-style:italic;
}

.glass{
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.025),
      rgba(255,255,255,.005)
    );

  border:1px solid var(--line);
  backdrop-filter:blur(14px);
}

.hairline{
  border-color:var(--line);
}

.ticker-up{
  color:var(--green);
}

.ticker-dn{
  color:var(--red);
}

.grain::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.05;
  mix-blend-mode:overlay;

  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
}

.scanline{
  background:
    linear-gradient(
      180deg,
      transparent 0,
      rgba(125,211,252,.04) 1px,
      transparent 2px
    );

  background-size:100% 3px;
}

.glow-accent{
  box-shadow:
    0 0 0 1px rgba(125,211,252,.18),
    0 8px 40px -8px rgba(125,211,252,.18) inset;
}

.pulse-dot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:var(--green);

  box-shadow:
    0 0 0 0 rgba(52,211,153,.6);

  animation:pulse 1.6s infinite;
}

@keyframes pulse{
  0%{
    box-shadow:0 0 0 0 rgba(52,211,153,.7)
  }

  70%{
    box-shadow:0 0 0 10px rgba(52,211,153,0)
  }

  100%{
    box-shadow:0 0 0 0 rgba(52,211,153,0)
  }
}

.marquee{
  display:flex;
  gap:2.5rem;
  animation:marquee 60s linear infinite;
}

@keyframes marquee{
  from{
    transform:translateX(0)
  }

  to{
    transform:translateX(-50%)
  }
}

.fade-in{
  animation:fade .5s ease both;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(6px)
  }

  to{
    opacity:1;
    transform:none
  }
}

.stream-line{
  animation:stream .35s ease both;
}

@keyframes stream{
  from{
    opacity:0;
    transform:translateY(4px);
    filter:blur(2px)
  }

  to{
    opacity:1;
    transform:none;
    filter:blur(0)
  }
}

.ambient{
  position:fixed;
  inset:auto -20vw -30vh -20vw;
  height:60vh;

  background:
    radial-gradient(
      60% 60% at 50% 50%,
      rgba(125,211,252,.08),
      transparent 70%
    );

  pointer-events:none;
  z-index:0;
  filter:blur(40px);
}

.ambient.two{
  inset:-30vh -10vw auto auto;

  background:
    radial-gradient(
      50% 50% at 50% 50%,
      rgba(196,181,253,.08),
      transparent 70%
    );
}

.chip{
  padding:2px 8px;
  border-radius:999px;
  font-size:11px;

  border:1px solid var(--line);

  background:rgba(255,255,255,.02);

  color:var(--muted);
}

.btn{
  padding:8px 12px;
  border:1px solid var(--line);
  border-radius:8px;

  background:rgba(255,255,255,.02);

  color:var(--ink);
  font-size:13px;

  transition:all .15s;
}

.btn:hover{
  border-color:#2a3140;
  background:rgba(255,255,255,.04);
}

.btn-primary{
  background:
    linear-gradient(
      180deg,
      #0b1220,
      #0a0f1b
    );

  border-color:#1f2a3a;
  color:#e7ecf3;
}

.btn-primary:hover{
  border-color:#3a4a66;
}

::-webkit-scrollbar{
  width:10px;
  height:10px
}

::-webkit-scrollbar-thumb{
  background:#1a1e25;
  border-radius:10px
}

::-webkit-scrollbar-track{
  background:transparent
}

.sev-info{
  color:var(--accent);
}

.sev-warn{
  color:var(--amber);
}

.sev-bad{
  color:var(--red);
}

.grid-bg{
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);

  background-size:32px 32px;
}

.terminal-cursor::after{
  content:"▍";
  color:var(--accent);
  animation:blink 1s steps(1) infinite;
  margin-left:2px;
}

@keyframes blink{
  50%{
    opacity:0
  }
}

details>summary{
  list-style:none;
  cursor:pointer;
}

details>summary::-webkit-details-marker{
  display:none;
}

.gauge-fill{
  transition:stroke-dashoffset .8s ease;
}

.reco-strong-buy{
  color:#34d399
}

.reco-buy{
  color:#86efac
}

.reco-hold{
  color:#fbbf24
}

.reco-sell{
  color:#fb7185
}

.reco-strong-sell{
  color:#ef4444
}

</style>
</head>

<body class="min-h-screen grain">

<div class="ambient"></div>
<div class="ambient two"></div>

<header class="relative z-10 border-b hairline">

  <div class="flex items-center gap-4 px-5 py-3">

    <div class="flex items-center gap-2">

      <div class="w-7 h-7 rounded-md grid place-items-center"
        style="background:radial-gradient(circle at 30% 30%,#7dd3fc,#1e3a8a)">

        <span class="font-mono text-[10px] font-bold text-slate-900">
          OR
        </span>

      </div>

      <div>

        <div class="font-mono text-[13px] tracking-[0.18em]">
          ORION<span class="text-slate-500">/INTEL</span>
        </div>

        <div class="font-mono text-[10px] text-slate-500 -mt-0.5">
          AUTONOMOUS FINANCIAL INTELLIGENCE · v0.9
        </div>

      </div>

    </div>

    <div class="flex-1"></div>

    <div class="hidden md:flex items-center gap-2 text-[11px] font-mono text-slate-400">
      <span class="pulse-dot"></span>
      <span id="status-text">LIVE · agents online</span>
    </div>

    <div class="font-mono text-[11px] text-slate-400" id="clock">
      —
    </div>

  </div>

  <div class="overflow-hidden border-t hairline bg-black/40">
    <div id="tape"
      class="marquee py-2 font-mono text-[12px] whitespace-nowrap">

      loading tape…

    </div>
  </div>

</header>

<section class="relative z-10 px-5 pt-8 pb-6 grid-bg">

  <div class="max-w-7xl mx-auto">

    <div class="flex items-end justify-between gap-6 flex-wrap">

      <div>

        <div class="font-mono text-[11px] tracking-[0.2em] text-slate-500">
          CONTINUOUS · MULTI-AGENT · INSTITUTIONAL
        </div>

        <h1 class="mt-2 text-4xl md:text-6xl font-light leading-[1.02]">
          Market research,<br/>
          <span class="font-serif text-[1.1em]">
            reimagined.
          </span>
        </h1>

        <p class="mt-4 max-w-2xl text-slate-400 text-[15px]">
          Seven autonomous agents continuously monitor public markets.
        </p>

      </div>

      <div class="flex items-center gap-2">

        <button class="btn font-mono text-[11px]"
          onclick="loadMemo()">

          GENERATE MEMO

        </button>

        <button class="btn font-mono text-[11px]"
          onclick="refreshAll()">

          REFRESH

        </button>

      </div>

    </div>

  </div>

</section>

<main class="relative z-10 max-w-[1500px] mx-auto px-5 pb-16 grid grid-cols-12 gap-4">

<aside class="col-span-3 space-y-4">

<div class="glass rounded-xl">

<div class="px-4 py-3 border-b hairline space-y-3">

<div class="flex items-center justify-between">

<div class="font-mono text-[11px] tracking-[0.18em] text-slate-300">
WATCHLIST
</div>

<span class="chip font-mono" id="universe-count">
—
</span>

</div>

<div class="relative">

<input
id="stock-search"
type="text"
placeholder="Search stocks..."
class="w-full bg-black/30 border border-[#1a1e25] rounded-lg px-3 py-2 text-sm text-slate-200 outline-none focus:border-cyan-400 transition"
/>

</div>

<div class="flex gap-2 mt-2">

<input
id="add-ticker-input"
type="text"
placeholder="Add ticker…"
class="flex-1 bg-black/30 border border-[#1a1e25] rounded-lg px-3 py-2 text-sm text-slate-200 outline-none focus:border-cyan-400 transition uppercase"
onkeydown="if(event.key==='Enter')addCustomTicker()"
/>

<button onclick="addCustomTicker()"
class="btn font-mono text-[11px] px-3">

+ADD

</button>

</div>

</div>

<div id="watchlist"
class="overflow-auto max-h-[40vh]"></div>

</div>

</aside>

<section class="col-span-6 space-y-4">

<div class="glass rounded-xl p-5">

<div class="flex items-start justify-between gap-4 flex-wrap">

<div>

<div class="font-mono text-[11px] text-slate-500"
id="sel-sector">

—

</div>

<div class="flex items-baseline gap-3 mt-1">

<div class="font-mono text-2xl tracking-tight"
id="sel-ticker">

—

</div>

<div class="text-slate-400 text-sm"
id="sel-name">

—

</div>

</div>

</div>

<div class="text-right">

<div class="font-mono text-3xl"
id="sel-price">

—

</div>

<div class="font-mono text-sm"
id="sel-change">

—

</div>

</div>

</div>

<div class="mt-4 grid grid-cols-2 sm:grid-cols-4 gap-3 font-mono text-[11px]">

<div>
<div class="text-slate-500">MARKET CAP</div>
<div id="sel-mcap" class="mt-0.5">—</div>
</div>

<div>
<div class="text-slate-500">P/E</div>
<div id="sel-pe" class="mt-0.5">—</div>
</div>

<div>
<div class="text-slate-500">52W RANGE</div>
<div id="sel-range" class="mt-0.5">—</div>
</div>

<div>
<div class="text-slate-500">VOLUME</div>
<div id="sel-vol" class="mt-0.5">—</div>
</div>

</div>

</div>

<div class="glass rounded-xl">

<div class="px-4 py-3 border-b hairline flex items-center justify-between">

<div class="font-mono text-[11px] tracking-[0.18em] text-slate-300">
PRICE · 6M
</div>

</div>

<div class="p-4">

<canvas id="priceChart" height="180"></canvas>

</div>

</div>

</section>

</main>

<script>

const API = "https://1orionmax-production.up.railway.app/api";

let UNIVERSE = [];
let SELECTED = null;
let PRICE_CHART = null;

const $ = (id) => document.getElementById(id);

const fmt = (n, d=2) =>
(n===null||n===undefined||Number.isNaN(n))
? '—'
: Number(n).toLocaleString(
undefined,
{
minimumFractionDigits:d,
maximumFractionDigits:d
}
);

const fmtCompact = (n) => {

if (n == null) return '—';

const a = Math.abs(n);

if(a>=1e12) return (n/1e12).toFixed(2)+'T';
if(a>=1e9) return (n/1e9).toFixed(2)+'B';
if(a>=1e6) return (n/1e6).toFixed(2)+'M';
if(a>=1e3) return (n/1e3).toFixed(2)+'K';

return n.toFixed(0);

};

const clsChange = (n) =>
n >= 0 ? 'ticker-up' : 'ticker-dn';

const sign = (n) =>
(n>=0?'+':'') + fmt(n,2);

function clock(){

const d = new Date();

$('clock').textContent =
d.toUTCString().replace('GMT','UTC');

}

setInterval(clock, 1000);
clock();

async function getJSON(url){

const r = await fetch(
url,
{
headers:{
'Accept':'application/json'
}
}
);

if(!r.ok)
throw new Error(`${r.status} ${url}`);

return r.json();

}

async function init(){

try{

const u =
await getJSON(`${API}/orion/universe`);

UNIVERSE = u.companies || [];

$('universe-count').textContent =
UNIVERSE.length + ' tickers';

renderWatchlist();

SELECTED =
UNIVERSE.find(c=>c.ticker==='NVDA')
|| UNIVERSE[0];

if(SELECTED){

await loadDashboard(SELECTED.ticker);

}

refreshWatchlistPrices();

}catch(e){

console.error(e);

}

}

function renderWatchlist(){

$('watchlist').innerHTML =
UNIVERSE.map(c => `

<button
data-t="${c.ticker}"
class="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-md hover:bg-white/[0.04] transition group">

<div class="text-left">

<div class="font-mono text-[12px]">
${c.ticker}
</div>

<div class="text-[10px] text-slate-500 truncate max-w-[180px]">
${c.name}
</div>

</div>

<div class="text-right font-mono text-[11px]"
id="wl-${c.ticker}">

—

</div>

</button>

`).join('');

$('watchlist')
.querySelectorAll('button[data-t]')
.forEach(b => {

b.addEventListener('click', () => {

select(b.dataset.t);

});

});

}

async function refreshWatchlistPrices(){

try {

const tickers =
UNIVERSE.map(c=>c.ticker).join(',');

const r = await fetch(
`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${tickers}`,
{
headers:{
Accept:'application/json'
}
}
);

const json = await r.json();

const results =
json?.quoteResponse?.result || [];

results.forEach(q => {

const el = $(`wl-${q.symbol}`);

const price = q.regularMarketPrice;
const chgPct = q.regularMarketChangePercent;

if (!el) return;

el.innerHTML = `

<div>
${price != null ? fmt(price, 2) : '—'}
</div>

<div class="${
chgPct != null
? clsChange(chgPct)
: 'text-slate-500'
} text-[10px]">

${
chgPct != null
? `${chgPct >= 0 ? '+' : ''}${chgPct.toFixed(2)}%`
: '—'
}

</div>

`;

});

} catch(e) {

console.warn(e);

}

}

function select(ticker){

SELECTED =
UNIVERSE.find(c=>c.ticker===ticker);

if(!SELECTED) return;

loadDashboard(ticker);

}

async function loadDashboard(ticker){

$('sel-ticker').textContent = ticker;

$('sel-name').textContent =
(UNIVERSE.find(c=>c.ticker===ticker)||{}).name || '';

$('sel-sector').textContent =
(UNIVERSE.find(c=>c.ticker===ticker)||{}).sector || '';

try{

const d =
await getJSON(`${API}/orion/dashboard/${ticker}`);

await browserQuote(ticker);

if (
!$('sel-price').textContent ||
$('sel-price').textContent === '—'
) {
renderQuote(d.quote);
}

renderChart(d.chart);

} catch(e) {

console.error(e);

}

}

function renderQuote(q){

const hasPrice = q.price != null;
const hasChange = q.change != null;
const hasChangePct = q.changePct != null;

$('sel-price').textContent =
hasPrice ? fmt(q.price,2) : '—';

if(hasChange && hasChangePct){

$('sel-change').className =
`font-mono text-sm ${clsChange(q.changePct)}`;

$('sel-change').textContent =
`${sign(q.change)} (${q.changePct >= 0 ? '+' : ''}${q.changePct.toFixed(2)}%)`;

} else {

$('sel-change').className =
'font-mono text-sm text-slate-500';

$('sel-change').textContent = '—';

}

$('sel-mcap').textContent =
q.marketCap != null ? fmtCompact(q.marketCap) : '—';

$('sel-pe').textContent =
q.peRatio != null ? q.peRatio.toFixed(1) : '—';

$('sel-range').textContent =
q.fiftyTwoWeekLow != null &&
q.fiftyTwoWeekHigh != null
? `${fmt(q.fiftyTwoWeekLow,2)} – ${fmt(q.fiftyTwoWeekHigh,2)}`
: '—';

$('sel-vol').textContent =
q.volume != null ? fmtCompact(q.volume) : '—';

}

async function browserQuote(ticker) {

try {

const r = await fetch(
`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}`,
{
headers: {
Accept: 'application/json'
}
}
);

const json = await r.json();

const q = json?.quoteResponse?.result?.[0];

if (!q) return;

const price = q.regularMarketPrice;
const chg = q.regularMarketChange;
const chgPct = q.regularMarketChangePercent;

$('sel-price').textContent =
price != null
? fmt(price, 2)
: '—';

$('sel-mcap').textContent =
q.marketCap != null
? fmtCompact(q.marketCap)
: '—';

$('sel-pe').textContent =
q.trailingPE != null
? q.trailingPE.toFixed(1)
: '—';

$('sel-vol').textContent =
q.regularMarketVolume != null
? fmtCompact(q.regularMarketVolume)
: '—';

$('sel-range').textContent =
q.fiftyTwoWeekLow != null &&
q.fiftyTwoWeekHigh != null
? `${fmt(q.fiftyTwoWeekLow, 2)} – ${fmt(q.fiftyTwoWeekHigh, 2)}`
: '—';

$('sel-name').textContent =
q.longName || q.shortName || ticker;

if (chg != null && chgPct != null) {

$('sel-change').textContent =
`${chg >= 0 ? '+' : ''}${fmt(chg, 2)} (${chgPct >= 0 ? '+' : ''}${chgPct.toFixed(2)}%)`;

$('sel-change').className =
`font-mono text-sm ${clsChange(chgPct)}`;

} else {

$('sel-change').textContent = '—';

$('sel-change').className =
'font-mono text-sm text-slate-500';

}

const wlEl = $(`wl-${ticker}`);

if (wlEl) {

wlEl.innerHTML = `

<div>
${price != null ? fmt(price, 2) : '—'}
</div>

<div class="${
chgPct != null
? clsChange(chgPct)
: 'text-slate-500'
} text-[10px]">

${
chgPct != null
? `${chgPct >= 0 ? '+' : ''}${chgPct.toFixed(2)}%`
: '—'
}

</div>

`;

}

} catch(e) {

console.warn(
'browserQuote failed:',
e.message
);

}

}

function renderChart(c){

const ctx =
$('priceChart').getContext('2d');

if(PRICE_CHART)
PRICE_CHART.destroy();

const labels =
(c.timestamps||[]).map(
t => new Date(t*1000).toLocaleDateString()
);

const closes = c.closes||[];

const grad =
ctx.createLinearGradient(0,0,0,200);

grad.addColorStop(
0,
'rgba(125,211,252,0.35)'
);

grad.addColorStop(
1,
'rgba(125,211,252,0)'
);

PRICE_CHART = new Chart(ctx, {

type:'line',

data:{
labels,
datasets:[{
data:closes,
borderColor:'#7dd3fc',
backgroundColor:grad,
fill:true,
tension:0.25,
pointRadius:0,
borderWidth:1.5
}]
},

options:{
responsive:true,

plugins:{
legend:{display:false}
},

scales:{
x:{
display:false
},
y:{
position:'right'
}
}
}

});

}

window.addEventListener(
'DOMContentLoaded',
()=>{

lucide.createIcons();

init();

}
);

</script>

</body>
</html>
